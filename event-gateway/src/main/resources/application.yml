server:
  port: 8080
spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:gatewaydb
  jpa:
    hibernate:
      ddl-auto: update
account:
  service:
    url: http://localhost:8081
resilience4j.circuitbreaker:
  instances:
    accountService:
      slidingWindowSize: 5
      failureRateThreshold: 50
      waitDurationInOpenState: 10000ms
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info