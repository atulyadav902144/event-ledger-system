version: '3.8'

services:
  account-service:
    build:
      context: ./account-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/accounts/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-gateway:
    build:
      context: ./event-gateway
    ports:
      - "8080:8080"
    depends_on:
      account-service:
        condition: service_healthy
    environment:
      - ACCOUNT_SERVICE_URL=http://account-service:8081
