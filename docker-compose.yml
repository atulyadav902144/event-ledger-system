version: '3.8'

services:
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=account-service
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:accountdb
      - SERVER_PORT=8081
    networks:
      - ledger-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  event-gateway:
    build:
      context: ./event-gateway
      dockerfile: Dockerfile
    container_name: event-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=event-gateway
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:gatewaydb
      - SERVER_PORT=8080
      - ACCOUNT_SERVICE_URL=http://account-service:8081
    networks:
      - ledger-network
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  ledger-network:
    driver: bridge
